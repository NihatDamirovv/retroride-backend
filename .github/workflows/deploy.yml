name: Deploy RetroRide Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'  # Java 17 daha stabildir və serverinlə uyğundur
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR with Gradle
        working-directory: ./retroride
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Copy files to Server (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Buradakı yolları layihəndəki faktiki yerlərinə görə düzəltmişəm:
          source: "retroride/build/libs/*.jar,docker-compose.yaml,Dockerfile,nginx.conf"
          target: "/home/ubuntu/retroride"
          strip_components: 1 # Bu, faylları düzgün qovluğa köçürməyə kömək edir

      - name: SSH and Restart Docker Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/retroride
            docker compose down
            docker compose up --build -d