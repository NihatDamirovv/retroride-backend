name: Deploy RetroRide Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'  # GitHub Actions-a Java 26 quraşdırılmasını əmr edirik
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./retroride
        run: chmod +x gradlew

      - name: Build JAR with Gradle
        working-directory: ./retroride
        run: ./gradlew bootJar -x test

      - name: Prepare JAR for Dockerfile
        run: |
          mkdir -p build/libs
          cp retroride/build/libs/*.jar build/libs/

      - name: Copy files to Server (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar,docker-compose.yaml,Dockerfile,index.html,nginx.conf"
          target: "/home/ubuntu/retroride"

      - name: SSH and Restart Docker Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/retroride
            docker compose down
            docker compose up --build -d