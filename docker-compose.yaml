services:
  db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123four
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: nihatdamirov/retroride-back:latest
    container_name: spring-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: 123four
    volumes:
      - ./uploads:/app/uploads

  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./retroride/index.html:/usr/share/nginx/html/index.html:ro

volumes:
  postgres_data: